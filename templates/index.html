<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samarth Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); 
            min-height: 100vh; 
            color: white; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .gradient-btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .gradient-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.5s ease-out; }
        .entry-item { transition: all 0.3s ease; }
        .entry-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">
    <!-- Header -->
    <div class="text-center mb-8 slide-in">
        <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">
            💰 Samarth Finance
        </h1>
        <p class="text-gray-400 text-lg">Track your money like a pro</p>
    </div>

    <div class="flex-1 flex justify-center items-start">
        <div class="glass w-full max-w-lg p-8 md:p-12 shadow-2xl slide-in">
            <!-- Balance Card -->
            <div class="text-center mb-10 p-8 glass rounded-2xl">
                <div class="flex items-center justify-center gap-3 mb-4">
                    <div class="w-16 h-16 bg-gradient-to-r from-green-500 to-green-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-wallet text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-400 uppercase text-xs tracking-wider">Total Balance</p>
                    </div>
                </div>
                <h2 class="text-5xl md:text-6xl font-black" id="balance">₹0.00</h2>
                <div class="flex justify-center gap-6 mt-6">
                    <div class="text-green-400 flex items-center gap-2 font-semibold">
                        <i class="fas fa-arrow-up"></i>
                        <span id="totalIncome">₹0</span>
                    </div>
                    <div class="text-red-400 flex items-center gap-2 font-semibold">
                        <i class="fas fa-arrow-down"></i>
                        <span id="totalExpense">₹0</span>
                    </div>
                </div>
            </div>

            <!-- Input Form -->
            <div class="space-y-6 mb-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-300 flex items-center gap-2">
                            <i class="fas fa-tag"></i> Description
                        </label>
                        <input id="desc" type="text" placeholder="Salary, Rent, Grocery..." 
                               class="w-full p-4 rounded-2xl bg-gray-900/50 border border-gray-700 focus:ring-4 focus:ring-blue-500/30 focus:border-transparent transition-all duration-300 text-lg placeholder-gray-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-300 flex items-center gap-2">
                            <i class="fas fa-rupee-sign"></i> Amount
                        </label>
                        <input id="amount" type="number" step="0.01" placeholder="1000" 
                               class="w-full p-4 rounded-2xl bg-gray-900/50 border border-gray-700 focus:ring-4 focus:ring-blue-500/30 focus:border-transparent transition-all duration-300 text-lg placeholder-gray-500">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="addEntry('income')" class="group relative overflow-hidden rounded-2xl p-5 font-bold text-lg bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 focus:ring-4 focus:ring-green-500/50 transition-all duration-300 flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl hover:-translate-y-1">
                        <i class="fas fa-plus-circle text-xl group-hover:scale-110 transition-transform"></i>
                        <span>Income (+)</span>
                    </button>
                    <button onclick="addEntry('expense')" class="group relative overflow-hidden rounded-2xl p-5 font-bold text-lg bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 focus:ring-4 focus:ring-red-500/50 transition-all duration-300 flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl hover:-translate-y-1">
                        <i class="fas fa-minus-circle text-xl group-hover:scale-110 transition-transform"></i>
                        <span>Expense (-)</span>
                    </button>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass p-6 rounded-2xl text-center">
                    <div class="text-2xl mb-2"><i class="fas fa-chart-line text-blue-400"></i></div>
                    <p class="text-gray-400 text-sm uppercase tracking-wider">Transactions</p>
                    <p class="text-2xl font-bold" id="transactionCount">0</p>
                </div>
                <div class="glass p-6 rounded-2xl text-center">
                    <div class="text-2xl mb-2"><i class="fas fa-clock text-yellow-400"></i></div>
                    <p class="text-gray-400 text-sm uppercase tracking-wider">Last Updated</p>
                    <p class="text-lg font-semibold" id="lastUpdated">-</p>
                </div>
            </div>

            <!-- History -->
            <div class="glass p-6 rounded-2xl">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold flex items-center gap-3">
                        <i class="fas fa-history text-blue-400"></i>
                        Transaction History
                    </h3>
                    <button onclick="clearAll()" class="text-red-400 hover:text-red-300 text-sm font-semibold flex items-center gap-1 transition-colors">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
                <div class="max-h-72 overflow-y-auto space-y-3 pr-2" id="history-list">
                    <div class="text-gray-500 text-center py-8 text-sm">No transactions yet. Add your first one! 🎉</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-gray-500 text-sm">
        <p>Made with ❤️ by Samarth | v2.0</p>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let totalIncome = 0;
        let totalExpense = 0;
        let total = 0;

        function init() {
            loadTransactions();
            updateUI();
        }

        function addEntry(type) {
            const desc = document.getElementById('desc').value.trim();
            const amt = parseFloat(document.getElementById('amount').value);
            
            if (!desc || isNaN(amt) || amt <= 0) {
                showNotification('Please fill all fields with valid amount!', 'error');
                return;
            }

            const transaction = {
                id: Date.now(),
                desc,
                amount: amt,
                type,
                date: new Date().toLocaleString('en-IN')
            };

            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));

            if (type === 'income') {
                totalIncome += amt;
                total += amt;
            } else {
                totalExpense += amt;
                total -= amt;
            }

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            
            updateUI();
            showNotification(`Added ${type === 'income' ? '+' : '-'}${amt.toLocaleString()} ${desc}`, 'success');
        }

        function updateUI() {
            document.getElementById('balance').innerText = `₹${total.toLocaleString('en-IN', {minimumFractionDigits: 0, maximumFractionDigits: 2})}`;
            document.getElementById('totalIncome').innerText = `₹${totalIncome.toLocaleString('en-IN', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            document.getElementById('totalExpense').innerText = `₹${totalExpense.toLocaleString('en-IN', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            document.getElementById('transactionCount').innerText = transactions.length;
            document.getElementById('lastUpdated').innerText = transactions.length ? new Date().toLocaleString('en-IN') : '-';

            const list = document.getElementById('history-list');
            if (transactions.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-center py-8 text-sm">No transactions yet. Add your first one! 🎉</div>';
                return;
            }

            list.innerHTML = transactions.map(t => `
                <div class="entry-item flex justify-between items-center p-4 rounded-xl glass hover:shadow-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm
                            ${t.type === 'income' ? 'bg-green-500/20 text-green-400 border-2 border-green-500/30' : 'bg-red-500/20 text-red-400 border-2 border-red-500/30'}">
                            ${t.type === 'income' ? '+' : '-'}
                        </div>
                        <div>
                            <p class="font-semibold">${t.desc}</p>
                            <p class="text-xs text-gray-500">${t.date}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black ${t.type === 'income' ? 'text-green-400' : 'text-red-400'}">
                            ${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString('en-IN')}
                        </p>
                        <button onclick="deleteTransaction(${t.id})" class="text-gray-400 hover:text-red-400 p-1 rounded-full hover:bg-gray-800 transition-all">
                            <i class="fas fa-trash-alt text-sm"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteTransaction(id) {
            const transaction = transactions.find(t => t.id === id);
            if (transaction) {
                if (transaction.type === 'income') {
                    totalIncome -= transaction.amount;
                    total += transaction.amount;
                } else {
                    totalExpense -= transaction.amount;
                    total -= transaction.amount;
                }
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('transactions', JSON.stringify(transactions));
                updateUI();
                showNotification('Transaction deleted!', 'success');
            }
        }

        function clearAll() {
            if (confirm('Are you sure you want to delete all transactions?')) {
                transactions = [];
                totalIncome = 0;
                totalExpense = 0;
                total = 0;
                localStorage.removeItem('transactions');
                updateUI();
                showNotification('All transactions cleared!', 'warning');
            }
        }

        function showNotification(message, type = 'info') {
            // Simple notification - you can enhance with toast library
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-2xl shadow-2xl text-white z-50 transform transition-all duration-300 ${
                type === 'success' ? 'bg-green-500' : 
                type === 'error' ? 'bg-red-500' : 
                type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500'
            }`;
            notification.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('translate-x-full');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const desc = document.getElementById('desc').value.trim();
                const amt = parseFloat(document.getElementById('amount').value);
                if (desc && !isNaN(amt) && amt > 0) {
                    addEntry(amt > 0 ? 'income' : 'expense');
                }
            }
        });

        // Load on page load
        init();
    </script>
</body>
</html>

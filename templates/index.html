<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samarth Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script> <style>
        body { background: linear-gradient(135deg, #1e1e2f, #2d2d44); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-5 flex justify-center">
    <div class="glass w-full max-w-md p-8 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">💰 My Finance Tracker</h1>
        
        <div class="text-center mb-8">
            <p class="text-gray-400 uppercase text-sm">Total Balance</p>
            <h2 class="text-4xl font-extrabold" id="balance">₹0.00</h2>
        </div>

        <div class="space-y-4">
            <input id="desc" type="text" placeholder="Description (e.g. Salary, Rent)" class="w-full p-3 rounded bg-gray-800 border-none focus:ring-2 focus:ring-blue-500">
            <input id="amount" type="number" placeholder="Amount (₹)" class="w-full p-3 rounded bg-gray-800 border-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <button onclick="addEntry('income')" class="w-1/2 bg-green-600 hover:bg-green-700 p-3 rounded font-bold transition">Income (+)</button>
                <button onclick="addEntry('expense')" class="w-1/2 bg-red-600 hover:bg-red-700 p-3 rounded font-bold transition">Expense (-)</button>
            </div>
        </div>

        <h3 class="mt-10 mb-4 font-bold border-b border-gray-600 pb-2">History</h3>
        <div class="max-h-60 overflow-y-auto" id="history-list">
            </div>
    </div>

    <script>
        let total = 0;
        function addEntry(type) {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amount').value);
            if (!desc || isNaN(amt)) return alert("Fill all fields!");

            const value = type === 'income' ? amt : -amt;
            total += value;
            document.getElementById('balance').innerText = `₹${total.toFixed(2)}`;

            // UI madhe Row add kara
            const list = document.getElementById('history-list');
            const color = type === 'income' ? 'text-green-400' : 'text-red-400';
            list.innerHTML = `
                <div class="flex justify-between p-2 border-b border-gray-700">
                    <span>${desc}</span>
                    <span class="${color}">${type === 'income' ? '+' : '-'}${amt}</span>
                </div>` + list.innerHTML;
        }
    </script>
</body>
</html>
